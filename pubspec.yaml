name: toko_baju_muslim
description: Aplikasi Manajemen Produk Toko Baju Muslim dengan Supabase

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.3.4
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  dotted_border: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1


flutter:
  uses-material-design: true
  assets:
    - .env
